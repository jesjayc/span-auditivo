<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Span de Dígitos Auditivo</title>
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
  <main id="app">
    
    <!-- Audio Test Screen (Caso precise usar no futuro) -->
    <section id="screen-audio-test" class="screen" hidden>
      <div class="card">
        <h2 class="title">Teste de Áudio</h2>
        <div class="instructions-text">
            <p>Antes de iniciar, vamos testar o áudio do seu computador.</p>
        </div>
        <div id="audio-test-content">
          <button id="btn-play-audio" class="btn-primary" style="margin-bottom: 20px;">
            <span id="play-audio-text">🔊 Reproduzir Áudio</span>
          </button>
          <p style="color: var(--text-dim); margin-bottom: 10px;">Digite os números que você ouviu:</p>
          <div id="audio-test-input-display" class="input-display"></div>
          <button id="btn-check-audio" class="btn-secondary" disabled>Verificar</button>
        </div>
        <p id="audio-test-feedback" class="feedback"></p>
        <button id="btn-start-test" class="btn-primary" hidden>Iniciar Teste</button>
        <button id="btn-reload-page" class="btn-secondary" hidden>Voltar ao Início</button>
      </div>
    </section>

    <!-- Instructions Screen -->
    <section id="screen-instructions" class="screen" hidden>
      <div class="card">
        <h2 id="instruction-title" class="title"></h2>
        <div id="instruction-content" class="instructions-text"></div>
        <button id="btn-ready" class="btn-primary">Estou Pronto</button>
      </div>
    </section>

    <!-- Test Screen -->
    <section id="screen-test" class="screen" hidden>
        <div class="card">
            <div id="test-preparing" class="animate-pulse">
                <h2 class="title" style="font-size: 3rem;">Prepare-se!</h2>
            </div>
            
            <div id="test-playing" hidden>
              <div class="speaker-emoji animate-pulse">🔊</div>
            </div>
            
            <div id="test-inputting" hidden>
              <div class="last-typed-display">
                  <span id="last-typed-digit"></span>
              </div>
              <div class="button-group">
                  <button id="btn-redo" class="btn-secondary">Refazer</button>
                  <button id="btn-next" class="btn-primary">Próximo</button>
              </div>
            </div>
        </div>
    </section>

    <!-- Results Screen -->
    <section id="screen-results" class="screen" hidden>
      <div class="card">
          <h2 class="title">Teste Concluído</h2>
          <div class="instructions-text">
              <p>Clique no botão abaixo para baixar o arquivo CSV com os resultados do teste auditivo.</p>
          </div>
          <button id="btn-download-csv" class="btn-primary">Baixar Resultados (CSV)</button>
          <button id="btn-restart" class="btn-secondary" style="margin-top: 15px;">Reiniciar Teste</button>
      </div>
    </section>

  </main>
  <script src="src/js/script.js"></script>
</body>
</html>
